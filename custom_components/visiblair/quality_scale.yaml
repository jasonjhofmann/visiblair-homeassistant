rules:
  # Bronze (mandatory)
  action-setup:
    status: exempt
    comment: Integration does not register custom service actions.
  appropriate-polling: done
  brands:
    status: todo
    comment: HACS integration; not yet listed in home-assistant/brands.
  common-modules: done
  config-flow: done
  config-flow-test-coverage:
    status: todo
    comment: Existing tests cover normalisation/diagnostics; config-flow paths (user, reauth, abort-on-duplicate, invalid MAC) still need coverage with pytest-homeassistant-custom-component.
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: No service actions to document.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions:
    status: todo
    comment: Add a "Removing the integration" section to README.
  entity-event-setup:
    status: exempt
    comment: No event subscriptions; all data flow is via DataUpdateCoordinator.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver (targeting Bronze for now; below are Silver-tier items)
  action-exceptions:
    status: exempt
    comment: No custom actions.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates:
    status: todo
    comment: PARALLEL_UPDATES not declared in any platform module.
  reauthentication-flow: done
  test-coverage:
    status: todo
    comment: Existing tests cover API/diagnostics; coordinator + entity tests still needed.
