name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Ruff (lint)
        run: |
          uv run --python 3.13 --with ruff \
            ruff check custom_components/ tests/

      - name: Ruff (format check)
        run: |
          uv run --python 3.13 --with ruff \
            ruff format --check custom_components/ tests/

      - name: Mypy (strict)
        run: |
          uv run --python 3.13 \
            --with mypy \
            --with homeassistant \
            --with aiohttp \
            --with voluptuous \
            mypy custom_components/visiblair/

      - name: Pytest (with coverage gate)
        run: |
          uv run --python 3.13 \
            --with pytest-homeassistant-custom-component \
            --with pytest-cov \
            python -m pytest tests/ -v \
              --cov=custom_components.visiblair \
              --cov-report=term-missing \
              --cov-fail-under=95
